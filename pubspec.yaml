name: flutter_cookiecutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.0
  flutter_secure_storage: ^4.2.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - lib/core/environment/.env.dev
    - lib/core/environment/.env.stg
    - lib/core/environment/.env.prod
